version: "3.8"
services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  scheduler:
    build: ./scheduler
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - FIREBASE_CREDENTIALS=/app/serviceAccountKey.json
    volumes:
      - ./serviceAccountKey.json:/app/serviceAccountKey.json:ro

  email_worker:
    build: ./email_worker
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - RESEND_API_KEY=${RESEND_API_KEY}

  telegram_worker:
    build: ./telegram_worker
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}

  discord_worker:
    build: ./discord_worker
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
