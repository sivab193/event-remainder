services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  scheduler:
    build:
      context: .
      dockerfile: scheduler/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - FIREBASE_CREDENTIALS=/app/serviceAccountKey.json
      - CHECK_INTERVAL=10
    volumes:
      - ./serviceAccountKey.json:/app/serviceAccountKey.json:ro
    healthcheck:
      test: ["CMD", "pgrep", "-f", "main.py"]
      interval: 30s
      timeout: 5s
      retries: 3

  email_worker:
    build:
      context: .
      dockerfile: email_worker/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM:-${SMTP_USER}}
    healthcheck:
      test: ["CMD", "pgrep", "-f", "main.py"]
      interval: 30s
      timeout: 5s
      retries: 3

  telegram_worker:
    build:
      context: .
      dockerfile: telegram_worker/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    healthcheck:
      test: ["CMD", "pgrep", "-f", "main.py"]
      interval: 30s
      timeout: 5s
      retries: 3

  discord_worker:
    build:
      context: .
      dockerfile: discord_worker/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
    healthcheck:
      test: ["CMD", "pgrep", "-f", "main.py"]
      interval: 30s
      timeout: 5s
      retries: 3

  bulk_import:
    build:
      context: .
      dockerfile: bulk_import/Dockerfile
    restart: "no"
    environment:
      - USER_UID=${USER_UID}
      - DEFAULT_TIMEZONE=${DEFAULT_TIMEZONE:-America/New_York}
      - CSV_PATH=/app/events.csv
      - FIREBASE_CREDENTIALS=/app/serviceAccountKey.json
    volumes:
      - ./serviceAccountKey.json:/app/serviceAccountKey.json:ro
      - ./events.csv:/app/events.csv:ro
    profiles:
      - import
