name: Master Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ui
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './ui/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Run Vitest (Unit & Integration)
        run: npm run test:coverage || exit 1
      - name: Enforce 80% Coverage threshold
        run: npx nyc check-coverage --lines 80 --functions 80 --branches 80
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright (E2E)
        run: npx playwright test
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ./ui/playwright-report/

  worker-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./python-workers
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov testcontainers redis httpx responses pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run Pytest
        run: pytest --cov=. --cov-report=xml --cov-fail-under=80

  mcp-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mcp-server
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './mcp-server/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Run Vitest (Unit & Integration)
        run: npm run test:coverage -- --passWithNoTests
